backend:
  name: git-gateway

media_folder: "public/assets/images"
public_folder: "/assets/images"

collections:
  - name: "pages"
    label: "Pages"
    folder: "src/content/pages"
    create: true
    format: "frontmatter"
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "publishDate", widget: "datetime" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "products"
    label: "Products"
    folder: "src/content/products"
    create: true
    format: "frontmatter"
    extension: "md"
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: "name", widget: "string" }
      - { label: "Price (£)", name: "price", widget: "number", value_type: "int" }
      - { label: "Short Description", name: "description", widget: "string" }
      - { label: "Main Image", name: "image", widget: "image", required: false }
      - label: "Gallery Images"
        name: "images"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Evening", value: "evening" }
          - { label: "Ready-to-Wear", value: "ready-to-wear" }
          - { label: "Accessories", value: "accessories" }
      - label: "Colours"
        name: "colors"
        widget: "list"
        required: false
        fields:
          - { label: "Colour Name", name: "name", widget: "string" }
          - { label: "Hex Code", name: "hex", widget: "string" }
      - label: "Sizes"
        name: "sizes"
        widget: "list"
        required: false
        field: { label: "Size", name: "size", widget: "string" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Sold Out", name: "soldOut", widget: "boolean", default: false }
      - { label: "Publish Date", name: "publishDate", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }
